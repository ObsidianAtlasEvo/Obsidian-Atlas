# Advanced CodeQL with custom config (disables js/missing-rate-limiting — Fastify+middie blind spot).
# If the repo also uses CodeQL "Default setup", disable it under Settings → Code security → Code scanning
# to avoid duplicate analyses, or keep only one path.
name: CodeQL

on:
  push:
    branches: [main, master, develop]
  pull_request:
  schedule:
    - cron: '25 5 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (JavaScript/TypeScript)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          config-file: ./.github/codeql/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript'
