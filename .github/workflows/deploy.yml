name: CD — Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip CI checks and deploy immediately'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  # ── 1. CI gate ──────────────────────────────────────────────────────────────
  ci:
    name: CI gate
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            atlas-backend/package-lock.json

      - name: Install frontend deps
        run: npm ci

      - name: Install backend deps
        run: npm ci --prefix atlas-backend

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test --if-present

      - name: Build frontend
        run: npm run build
        env:
          VITE_ATLAS_SAME_ORIGIN: true

      - name: Typecheck backend
        run: npm run typecheck --prefix atlas-backend

  # ── 2. Deploy via Cloudflare Tunnel ─────────────────────────────────────────
  deploy:
    name: Deploy to obsidianatlastech.com
    runs-on: ubuntu-latest
    needs: [ci]
    permissions:
      contents: read
    if: |
      always() &&
      (needs.ci.result == 'success' || needs.ci.result == 'skipped')
    environment:
      name: production
      url: https://obsidianatlastech.com

    steps:
      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb \
            -o cloudflared.deb
          sudo dpkg -i cloudflared.deb
          cloudflared --version

      - name: Configure SSH via Cloudflare Tunnel
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          CF_TUNNEL_HOSTNAME: ${{ secrets.CF_TUNNEL_HOSTNAME }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Write private key — printf preserves exact PEM newlines
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/atlas_deploy
          chmod 600 ~/.ssh/atlas_deploy

          # Write SSH config using Python to avoid YAML << heredoc conflict
          python3 - <<'PYEOF'
          import os
          config = f"""Host atlas-vps
HostName {os.environ['CF_TUNNEL_HOSTNAME']}
User {os.environ['VPS_USER']}
IdentityFile ~/.ssh/atlas_deploy
ProxyCommand cloudflared access ssh --hostname %h
StrictHostKeyChecking no
UserKnownHostsFile /dev/null
ServerAliveInterval 30
ServerAliveCountMax 5
ConnectTimeout 30
"""
          with open(os.path.expanduser('~/.ssh/config'), 'w') as f:
              f.write(config)
          print("SSH config written:")
          print(config)
          PYEOF

          chmod 600 ~/.ssh/config

          echo "Testing tunnel connection..."
          ssh atlas-vps "echo '✓ Tunnel OK — connected as $(whoami) on $(hostname)'"

      - name: Deploy via Cloudflare Tunnel
        run: |
          ssh atlas-vps 'bash -s' <<'REMOTE'
          set -euo pipefail

          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh" --no-use

          PM2_BIN=$(command -v pm2 2>/dev/null \
            || ls ~/.nvm/versions/node/*/bin/pm2 2>/dev/null | tail -1 \
            || ls /usr/local/bin/pm2 /usr/bin/pm2 2>/dev/null | head -1 \
            || echo "pm2")

          DEPLOY_DIR="/var/www/obsidian-atlas-src"
          TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S UTC')

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Obsidian Atlas — Deploy @ $TIMESTAMP"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          cd "$DEPLOY_DIR"

          echo "[1/8] Pulling latest code..."
          git fetch origin main
          git reset --hard origin/main
          echo "      ✓ $(git rev-parse --short HEAD)"

          echo "[2/8] Installing frontend deps..."
          npm ci --prefer-offline
          echo "      ✓ Done"

          echo "[3/8] Building frontend..."
          npm run build
          echo "      ✓ dist/ ready"

          echo "[4/8] Installing backend deps..."
          npm ci --prefix atlas-backend --prefer-offline
          echo "      ✓ Done"

          echo "[5/8] Building backend..."
          npm run build --prefix atlas-backend
          echo "      ✓ atlas-backend/dist/ ready"

          echo "[6/8] Reloading PM2..."
          ENV_FILE="$DEPLOY_DIR/atlas-backend/.env"
          if [ -f "$ENV_FILE" ]; then
            set -a && source "$ENV_FILE" && set +a
            echo "      ✓ Sourced .env"
          else
            echo "      ⚠ No .env found — using existing PM2 env"
          fi

          if $PM2_BIN list | grep -q "atlas-api"; then
            $PM2_BIN reload atlas-api --update-env
          else
            if [ -f ecosystem.config.cjs ]; then
              $PM2_BIN start ecosystem.config.cjs --env production
            else
              cd atlas-backend
              $PM2_BIN start dist/index.js --name atlas-api \
                --node-args="--max-old-space-size=512"
              cd ..
            fi
          fi
          $PM2_BIN save
          echo "      ✓ PM2 reloaded"

          echo "[7/8] Running migrations..."
          MIGRATION_DIR="$DEPLOY_DIR/atlas-backend/migrations"
          DB_PATH="$DEPLOY_DIR/atlas-backend/data/atlas.db"
          if [ -d "$MIGRATION_DIR" ]; then
            for migration in $(ls "$MIGRATION_DIR"/*.sql 2>/dev/null | sort); do
              echo "      Applying: $(basename $migration)"
              sqlite3 "$DB_PATH" < "$migration" || true
            done
            echo "      ✓ Migrations applied"
          else
            echo "      ⚠ No migrations dir — skipping"
          fi

          echo "[8/8] Reloading nginx..."
          sudo nginx -t && sudo nginx -s reload || true
          echo "      ✓ nginx reloaded"

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ Deploy complete!"
          echo "  Site: https://obsidianatlastech.com"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          REMOTE

      - name: Post-deploy health check
        run: |
          echo "Waiting 10s for PM2 to stabilize..."
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            https://obsidianatlastech.com/api/health 2>/dev/null || echo "000")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "503" ]; then
            echo "✅ Health check passed (status $STATUS)"
          else
            echo "❌ Health check failed — HTTP $STATUS"
            exit 1
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deploy FAILED for commit ${{ github.sha }}"
          echo "::error::Check the tunnel deploy step above for the root cause."
