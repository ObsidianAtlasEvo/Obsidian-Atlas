name: CD — Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip CI checks and deploy immediately'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: deploy-production
  cancel-in-progress: false  # never cancel an in-flight deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Minimal permissions — this workflow only reads repo content and SSHes out
permissions:
  contents: read

jobs:
  # ── 1. CI gate (re-run lint/test/build before deploying) ──────────────────
  ci:
    name: CI gate
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            atlas-backend/package-lock.json

      - name: Install frontend deps
        run: npm ci

      - name: Install backend deps
        run: npm ci --prefix atlas-backend

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test --if-present

      - name: Build frontend
        run: npm run build
        env:
          VITE_ATLAS_SAME_ORIGIN: true

      - name: Typecheck backend
        run: npm run typecheck --prefix atlas-backend

  # ── 2. Deploy to VPS via Cloudflare Tunnel ────────────────────────────────
  deploy:
    name: Deploy to obsidianatlastech.com
    runs-on: ubuntu-latest
    needs: [ci]
    permissions:
      contents: read
    # Also run if skip_tests=true (ci job was skipped)
    if: |
      always() &&
      (needs.ci.result == 'success' || needs.ci.result == 'skipped')
    environment:
      name: production
      url: https://obsidianatlastech.com

    steps:
      # ── Install cloudflared on the runner ─────────────────────────────────
      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb \
            -o cloudflared.deb
          sudo dpkg -i cloudflared.deb
          cloudflared --version

      # ── Write SSH key and configure SSH to proxy through the tunnel ────────
      - name: Configure SSH via Cloudflare Tunnel
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          CF_TUNNEL_HOSTNAME: ${{ secrets.CF_TUNNEL_HOSTNAME }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Write private key — preserve exact formatting (critical for PEM keys)
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/atlas_deploy
          chmod 600 ~/.ssh/atlas_deploy

          # SSH config: route all connections to VPS through the cloudflared tunnel
          # CF_TUNNEL_HOSTNAME is the SSH tunnel hostname (e.g. ssh.obsidianatlastech.com)
          cat > ~/.ssh/config <<EOF
          Host atlas-vps
            HostName ${CF_TUNNEL_HOSTNAME}
            User ${VPS_USER}
            IdentityFile ~/.ssh/atlas_deploy
            ProxyCommand cloudflared access ssh --hostname %h
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ServerAliveInterval 30
            ServerAliveCountMax 5
            ConnectTimeout 30
          EOF
          chmod 600 ~/.ssh/config

          echo "SSH config written. Testing tunnel connection..."
          ssh atlas-vps "echo '✓ Tunnel connected as $(whoami)@$(hostname)'"

      # ── Run deploy script over the tunnel ─────────────────────────────────
      - name: Deploy via Cloudflare Tunnel
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          VPS_APP_PATH: ${{ secrets.VPS_APP_PATH }}
        run: |
          ssh atlas-vps bash -s <<'REMOTE'
            set -euo pipefail

            # Source NVM if present (non-interactive SSH sessions don't load .bashrc)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh" --no-use

            # Resolve PM2 path for non-interactive SSH sessions
            PM2_BIN=$(command -v pm2 2>/dev/null || \
              ls ~/.nvm/versions/node/*/bin/pm2 2>/dev/null | tail -1 || \
              ls /usr/local/bin/pm2 2>/dev/null || \
              ls /usr/bin/pm2 2>/dev/null || \
              echo "pm2")

            DEPLOY_DIR="$(cat /tmp/atlas-deploy-dir 2>/dev/null || echo "$HOME/obsidian-atlas-src")"
            TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S UTC')

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  Obsidian Atlas — Deploy @ $TIMESTAMP"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            cd "$DEPLOY_DIR"

            # ── Pull latest code ──────────────────────────────────────────
            echo "[1/6] Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main
            echo "      ✓ On commit $(git rev-parse --short HEAD)"

            # ── Install frontend dependencies ─────────────────────────────
            echo "[2/6] Installing frontend dependencies..."
            npm ci --prefer-offline
            echo "      ✓ Done"

            # ── Build frontend (Vite → dist/) ─────────────────────────────
            echo "[3/6] Building frontend..."
            npm run build
            echo "      ✓ dist/ ready"

            # ── Install backend dependencies ──────────────────────────────
            echo "[4/6] Installing backend dependencies..."
            npm ci --prefix atlas-backend --prefer-offline
            echo "      ✓ Done"

            # ── Build backend ─────────────────────────────────────────────
            echo "[5/6] Building backend..."
            npm run build --prefix atlas-backend
            echo "      ✓ atlas-backend/dist/ ready"

            # ── Reload PM2 ───────────────────────────────────────────────
            echo "[6/6] Reloading PM2 process..."
            ENV_FILE="$DEPLOY_DIR/atlas-backend/.env"
            if [ -f "$ENV_FILE" ]; then
              set -a && source "$ENV_FILE" && set +a
              echo "      ✓ Sourced $ENV_FILE"
            else
              echo "      ⚠ No .env file found — using existing PM2 env"
            fi

            if $PM2_BIN list | grep -q "atlas-api"; then
              $PM2_BIN reload atlas-api --update-env
            else
              if [ -f ecosystem.config.cjs ]; then
                $PM2_BIN start ecosystem.config.cjs --env production
              else
                cd atlas-backend
                $PM2_BIN start dist/index.js --name atlas-api \
                  --node-args="--max-old-space-size=512"
                cd ..
              fi
              $PM2_BIN save
            fi

            $PM2_BIN save
            echo "      ✓ PM2 reloaded"

            # ── Run SQLite migrations ─────────────────────────────────────
            echo "[7/8] Running database migrations..."
            MIGRATION_DIR="$DEPLOY_DIR/atlas-backend/migrations"
            DB_PATH="$DEPLOY_DIR/atlas-backend/data/atlas.db"
            if [ -d "$MIGRATION_DIR" ]; then
              for migration in $(ls "$MIGRATION_DIR"/*.sql 2>/dev/null | sort); do
                echo "      Applying: $(basename $migration)"
                sqlite3 "$DB_PATH" < "$migration" || true
              done
              echo "      ✓ Migrations applied"
            else
              echo "      ⚠ No migrations directory — skipping"
            fi

            # ── Reload nginx ─────────────────────────────────────────────
            echo "[8/8] Reloading nginx..."
            sudo nginx -t && sudo nginx -s reload || true
            echo "      ✓ nginx reloaded"

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  ✅ Deploy complete!"
            echo "  Site: https://obsidianatlastech.com"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          REMOTE

      # ── Health check ──────────────────────────────────────────────────────
      - name: Post-deploy health check
        run: |
          echo "Waiting 10s for PM2 to stabilize..."
          sleep 10
          echo "Probing health endpoint..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            https://obsidianatlastech.com/api/health 2>/dev/null)
          STATUS=${STATUS:-000}
          echo "HTTP status: $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "503" ]; then
            echo "✅ Health check passed (status $STATUS)"
          else
            echo "❌ Health check failed — site returned HTTP $STATUS"
            exit 1
          fi

      # ── Notify on failure ─────────────────────────────────────────────────
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deploy to obsidianatlastech.com FAILED for commit ${{ github.sha }}"
          echo "::error::Check the tunnel deploy step above for the root cause."
