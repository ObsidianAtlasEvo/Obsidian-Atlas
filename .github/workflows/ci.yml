# Atlas-Audit: [QA-CI] Verified — workflow_dispatch + push (integration branches) + all pull_request targets; then lint, test, Vite build, backend tsc emit.
name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, master, develop]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            atlas-backend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install atlas-backend dependencies
        run: npm ci --prefix atlas-backend

      - name: Lint (TypeScript frontend + backend)
        run: npm run lint

      - name: Test (Vitest)
        run: npm run test

      - name: Build frontend (Vite)
        run: npm run build

      - name: Build atlas-backend (tsc → dist)
        run: npm run build --prefix atlas-backend
