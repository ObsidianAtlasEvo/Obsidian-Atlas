<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <title>Obsidian Atlas</title>

    <!-- Favicons / brand -->
    <link rel="icon" type="image/x-icon" href="/brand/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/brand/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/brand/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/brand/favicon-48.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/brand/favicon-96.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/brand/favicon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/brand/icon-512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/brand/apple-touch-icon.png" />
    <link rel="manifest" href="/brand/site.webmanifest" />
    <meta name="theme-color" content="#0c0a09" />

    <!-- Open Graph / social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Obsidian Atlas" />
    <meta property="og:description" content="Private instrument for inquiry, synthesis, and memory." />
    <meta property="og:image" content="/brand/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Obsidian Atlas" />
    <meta name="twitter:description" content="Private instrument for inquiry, synthesis, and memory." />
    <meta name="twitter:image" content="/brand/og-image.png" />

    <style>
      html, body, #root {
        background-color: #050506 !important;
        color: #E2E2D9 !important;
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        min-height: 100vh;
        min-height: 100dvh;
      }
      /* Desktop: lock scroll on the outer shell (scroll happens inside chambers) */
      @media (min-width: 640px) {
        html, body, #root { overflow: hidden; }
      }
      /* Mobile: allow natural page scroll */
      @media (max-width: 639px) {
        body { overflow-y: auto; }
        #root { overflow: visible; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
