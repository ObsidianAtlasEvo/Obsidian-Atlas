# Obsidian Atlas — nginx site fragment (TLS: ssl_certificate / listen 443 managed elsewhere).
# Upstream: Fastify full backend on 3001. Set root to your `dist/` path after `npm run build`.
#
#   include /path/to/deploy/nginx-atlas.conf;
#
# Google OAuth redirect URI: https://obsidianatlastech.com/auth/google/callback

server {
	server_name obsidianatlastech.com;

	root /var/www/obsidian-atlas-src/dist;
	index index.html;

	gzip on;
	gzip_types text/css application/javascript application/json image/svg+xml;

	# /api/v1/... → http://127.0.0.1:3001/v1/... (strip /api)
	location /api/ {
		proxy_pass http://127.0.0.1:3001/;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_buffering off;
		proxy_read_timeout 600s;
	}

	# /auth/google, /auth/google/callback, … — full path preserved
	location /auth {
		proxy_pass http://127.0.0.1:3001;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_buffering off;
	}

	# Optional: same-origin Ollama
	location /ollama/ {
		proxy_pass http://127.0.0.1:11434/;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_read_timeout 600s;
	}

	location / {
		try_files $uri $uri/ /index.html;
	}
}
